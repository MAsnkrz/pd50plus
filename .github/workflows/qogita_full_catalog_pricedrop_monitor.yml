name: Qogita Full Catalog Price Drop Monitor

on:
  schedule:
    - cron: "0 * * * *"      # every hour
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

# Prevent overlapping runs — the full catalog download could take a
# while depending on its size, especially relative to lighter
# brand-filtered monitors.
concurrency:
  group: qogita-full-catalog-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          QOGITA_EMAIL:    ${{ secrets.QOGITA_EMAIL }}
          QOGITA_PASSWORD: ${{ secrets.QOGITA_PASSWORD }}
          RUN_ONCE: "true"
        run: python qogita_full_catalog_pricedrop_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshot_qogita_fullcatalog_prices.json baseline_done_fullcatalog.txt 2>/dev/null || true
          git stash || true
          git pull --rebase origin main || true
          git stash pop || true
          git add snapshot_qogita_fullcatalog_prices.json baseline_done_fullcatalog.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update full catalog price snapshot [skip ci]"
          git push origin HEAD:main
